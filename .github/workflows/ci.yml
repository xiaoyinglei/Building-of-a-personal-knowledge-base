name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run pytest -v
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run lint-imports
      - run: uv run python -m scripts.check_repo_only_imports

